docRoot                   $VH_ROOT/html/frontend/dist
vhDomain                  localhost
enableGzip                1
enableBr                  1

index  {
  useServer               0
  indexFiles              index.html
}

# Proxy backend API and WebSocket traffic to the Node.js container
extprocessor backend_api {
  type                    proxy
  address                 http://backend:3001
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

context /api/ {
  type                    proxy
  handler                 backend_api
  addDefaultCharset       off
}

context /socket.io/ {
  type                    proxy
  handler                 backend_api
  addDefaultCharset       off
}

# SPA fallback: serve index.html for all non-file routes
context / {
  location                $VH_ROOT/html/frontend/dist
  allowBrowse             0
  rewrite  {
    enable                1
    rules                 <<<END_RULES
RewriteCond %{REQUEST_URI} !^/api/
RewriteCond %{REQUEST_URI} !^/socket.io/
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ /index.html [L]
END_RULES
  }
}
