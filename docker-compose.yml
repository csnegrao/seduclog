version: '3.8'

services:
  litespeed:
    image: litespeedtech/openlitespeed:latest
    container_name: seduclog_litespeed
    ports:
      - "80:80"
      - "443:443"
      - "7080:7080"   # LiteSpeed WebAdmin console
    volumes:
      - ./:/var/www/vhosts/localhost/html
      - ./docker/litespeed/vhconf.conf:/usr/local/lsws/conf/vhosts/localhost/vhconf.conf:ro
    environment:
      - TZ=America/Manaus
    depends_on:
      - mariadb
      - backend
    restart: unless-stopped

  backend:
    image: node:20-alpine
    container_name: seduclog_backend
    working_dir: /app
    command: sh -c "npm install && npm run prisma:generate && npm run dev"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=mysql://${DB_USERNAME:-seduclog_user}:${DB_PASSWORD:-your_password_here}@mariadb:3306/${DB_DATABASE:-seduclog}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-development}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    ports:
      - "3001:3001"
    depends_on:
      - mariadb
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    container_name: seduclog_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_DATABASE:-seduclog}
      MARIADB_USER: ${DB_USERNAME:-seduclog_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-your_password_here}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

volumes:
  mariadb_data:
