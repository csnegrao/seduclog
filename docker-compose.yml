services:
  # ─────────────────────────────────────────────
  # PostgreSQL database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: seduclog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seduclog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-seduclog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seduclog} -d ${POSTGRES_DB:-seduclog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ─────────────────────────────────────────────
  # Node.js API
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seduclog_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-seduclog}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-seduclog}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    ports:
      - "4000:4000"

  # ─────────────────────────────────────────────
  # React frontend served by nginx
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: seduclog_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
