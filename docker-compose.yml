version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: seduclog
      POSTGRES_PASSWORD: seduclog_pass
      POSTGRES_DB: seduclog_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://seduclog:seduclog_pass@db:5432/seduclog_db
      JWT_SECRET: change-me-in-production
      PORT: 3001
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - db

volumes:
  postgres_data:
