version: '3.9'

services:
  # ── PostgreSQL database ─────────────────────────────────────────────────────
  # NOTE: The current backend uses an in-memory store. This service is provided
  # for future migration to a real Postgres database via Prisma.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seduclog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seduclog_pass}
      POSTGRES_DB: ${POSTGRES_DB:-seduclog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-seduclog}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-seduclog}:${POSTGRES_PASSWORD:-seduclog_pass}@postgres:5432/${POSTGRES_DB:-seduclog}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        REACT_APP_API_BASE: ''  # Empty so frontend uses relative /api paths via nginx proxy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '80:80'
services:
  litespeed:
    image: litespeedtech/openlitespeed:latest
    container_name: seduclog_litespeed
    ports:
      - "80:80"
      - "443:443"
      - "7080:7080"   # LiteSpeed WebAdmin console
    volumes:
      - ./:/var/www/vhosts/localhost/html
      - ./docker/litespeed/vhconf.conf:/usr/local/lsws/conf/vhosts/localhost/vhconf.conf:ro
    environment:
      - TZ=America/Manaus
    depends_on:
      - mariadb
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    container_name: seduclog_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_DATABASE:-seduclog}
      MARIADB_USER: ${DB_USERNAME:-seduclog_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-your_password_here}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

volumes:
  mariadb_data:
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: seduclog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: seduclog
      POSTGRES_PASSWORD: seduclog_pass
      POSTGRES_DB: seduclog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: seduclog_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
